<!DOCTYPE html>
<!--
    This page does NOT extend layout/base.html.
    Reasons:
    1. base.html has navbar links to /dashboard, /bill/new etc.
       A non-logged-in user clicking those would be blocked.
    2. The login page has a centered card design, not the
       standard page layout.
    3. base.html loads bill.js which is only for bill forms.
-->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login — The Motors</title>

    <!-- Bootstrap CSS — loaded from CDN, no login needed -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <style>
        /*
         * Full-page centered layout.
         * The login card sits in the exact middle of the screen.
         */
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* The login card container */
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }

        /* Card with no border, rounded corners, clean shadow */
        .login-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        /* Dark header section with garage brand */
        .login-header {
            background: #1a1a2e;
            color: white;
            padding: 2.5rem 2rem 2rem;
            text-align: center;
        }

        .login-header .brand-icon {
            font-size: 3rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.25rem;
            letter-spacing: 0.5px;
        }

        .login-header p {
            font-size: 0.85rem;
            opacity: 0.7;
            margin: 0;
        }

        /* Form section */
        .login-body {
            padding: 2rem;
        }

        /* Custom input group styling */
        .input-group-text {
            background: #f8f9fa;
            border-right: none;
            color: #6c757d;
        }

        .form-control {
            border-left: none;
        }

        .form-control:focus {
            border-color: #86b7fe;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
        }

        /* Sign in button */
        .btn-signin {
            background: #1a1a2e;
            border: none;
            color: white;
            font-size: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: background 0.2s;
        }

        .btn-signin:hover {
            background: #2d2d4e;
            color: white;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            padding-bottom: 1.5rem;
            font-size: 0.78rem;
            color: #adb5bd;
        }
    </style>
</head>

<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- ── HEADER ──────────────────────────────────────── -->
        <div class="login-header">
            <span class="brand-icon">
                <i class="bi bi-tools"></i>
            </span>
            <h1>The J Motors Billing</h1>
            <p>Sign in to manage your workshop</p>
        </div>

        <!-- ── BODY ───────────────────────────────────────── -->
        <div class="login-body">

            <div th:if="${loginError}"
                 class="alert alert-danger alert-dismissible mb-4"
                 role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${errorMessage}">
                    Incorrect username or password.
                </span>
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                </button>
            </div>

            <div th:if="${logoutSuccess}"
                 class="alert alert-success alert-dismissible mb-4"
                 role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                You have been logged out successfully.
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                </button>
            </div>

            <form th:action="@{/login}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold text-muted small"
                           for="username">
                        USERNAME
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text"
                               id="username"
                               name="username"
                               class="form-control"
                               placeholder="Enter your username"
                               autocomplete="username"
                               autofocus
                               required/>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold text-muted small"
                           for="password">
                        PASSWORD
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter your password"
                               autocomplete="current-password"
                               required/>
                    </div>
                </div>

                <div class="mb-4 d-flex align-items-center">
                    <div class="form-check">
                        <input type="checkbox"
                               class="form-check-input"
                               id="rememberMe"
                               name="remember-me"/>
                        <label class="form-check-label text-muted"
                               for="rememberMe">
                            Keep me signed in
                        </label>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-signin">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Sign In
                    </button>
                </div>

            </form>

        </div>

        <div class="login-footer">
            <i class="bi bi-shield-check me-1"></i>
            Session expires after 30 minutes of inactivity
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
