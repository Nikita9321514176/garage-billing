<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Invoice Not Found — The J Motors</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <style>
        body { background:#f0f2f5; display:flex; align-items:center;
               justify-content:center; min-height:100vh; }
        .box { background:#fff; border-radius:12px; padding:48px 40px;
               text-align:center; max-width:400px;
               box-shadow:0 4px 24px rgba(0,0,0,0.10); }
    </style>
</head>
<body>
<div class="box">
    <div style="font-size:64px">&#128196;</div>
    <h4 class="mt-3 fw-bold">Invoice Not Found</h4>
    <p class="text-muted" th:text="${errorMessage}">
        The invoice you are looking for does not exist.
    </p>
    <p class="text-muted small">
        Please contact The J Motors at
        <a href="tel:7303666143">7303666143</a>
    </p>
</div>
</body>
</html>
