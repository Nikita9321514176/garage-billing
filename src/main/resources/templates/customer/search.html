<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{layout/base :: layout(~{::content})}">
<th:block th:fragment="content">

<div class="page-header">
    <h2>
        <i class="bi bi-person-search me-2 text-primary"></i>
        Search Customer
    </h2>
</div>

<!-- Search by name form -->
<div class="card mb-4">
    <div class="card-body">
        <form th:action="@{/customer/searchByName}" method="get">
            <div class="row g-2 align-items-end">
                <div class="col-md-8">
                    <label class="form-label fw-semibold">
                        Search by Customer Name
                    </label>
                    <input type="text"
                           name="name"
                           class="form-control form-control-lg"
                           placeholder="Enter customer name (partial is fine)"
                           th:value="${searchName}"
                           autofocus
                           autocomplete="off"/>
                    <div class="form-text">
                        Type any part of the name — e.g. "ravi" finds "Ravi Kumar"
                    </div>
                </div>
                <div class="col-md-4">
                    <button type="submit"
                            class="btn btn-primary btn-lg w-100">
                        <i class="bi bi-search me-2"></i>Search
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- Search results -->
<div th:if="${searchResults != null}">

    <!-- No results -->
    <div th:if="${#lists.isEmpty(searchResults)}"
         class="alert alert-warning">
        <i class="bi bi-exclamation-triangle me-2"></i>
        No customers found with name containing
        "<strong th:text="${searchName}">—</strong>".
    </div>

    <!-- Results table -->
    <div th:if="${not #lists.isEmpty(searchResults)}"
         class="card">
        <div class="card-header bg-dark text-white
                    d-flex justify-content-between align-items-center">
            <span>
                <i class="bi bi-people me-2"></i>
                Search Results
            </span>
            <span class="badge bg-secondary"
                  th:text="${resultCount} + ' found'">0</span>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Member Since</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cust : ${searchResults}">
                        <td class="fw-semibold"
                            th:text="${cust.name}">—</td>
                        <td>
                            <a th:href="'tel:' + ${cust.phone}"
                               th:text="${cust.phone}"
                               class="text-decoration-none">—</a>
                        </td>
                        <td class="text-muted"
                            th:text="${cust.email ?: '—'}">—</td>
                        <td class="text-muted small"
                            th:text="${cust.createdAt != null ?
                                #temporals.format(cust.createdAt,
                                'dd MMM yyyy') : '—'}">—</td>
                        <td>
                            <a th:href="@{/customer/{id}(id=${cust.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-eye"></i> View
                            </a>
                            <a th:href="@{/bill/new(customerId=${cust.id})}"
                               class="btn btn-sm btn-outline-success">
                                <i class="bi bi-file-earmark-plus"></i>
                                New Bill
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</th:block>
</body>
</html>
